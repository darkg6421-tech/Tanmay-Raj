  <!-- Scripts -->
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Disable local model loading, only use CDN
    env.allowLocalModels = false;

    // ---------- GLOBALS & UI ELEMENTS ----------
    let classifier = null;
    const chat = document.getElementById('chat');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceRipple = document.getElementById('voiceRipple');
    const modelStatus = document.getElementById('modelStatus');
    const batteryIndicator = document.getElementById('batteryIndicator');
    const themeToggle = document.getElementById('themeToggle');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    
    // Initialize Lucide Icons
    lucide.createIcons();

    // ---------- THEME MANAGEMENT ----------
    const html = document.documentElement;
    const themeMeta = document.getElementById('theme-color-meta');
    
    function toggleTheme() {
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        html.classList.add('light'); // For CSS specific targeting if needed
        themeMeta.setAttribute('content', '#f8fafc');
      } else {
        html.classList.add('dark');
        html.classList.remove('light');
        themeMeta.setAttribute('content', '#0f172a');
      }
    }
    
    themeToggle.onclick = toggleTheme;

    // ---------- INDEXEDDB UTILS ----------
    const DB_NAME = 'AIAssistantDB';
    const DB_VERSION = 1;
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('tasks')) db.createObjectStore('tasks', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'id', autoIncrement: true });
          if (!db.objectStoreNames.contains('reminders')) db.createObjectStore('reminders', { keyPath: 'id', autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; resolve(db); };
        request.onerror = () => reject('IndexedDB error');
      });
    }

    async function dbAdd(storeName, data) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const req = store.add(data);
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = reject;
      });
    }

    async function dbClear(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const req = store.clear();
        req.onsuccess = resolve;
        req.onerror = reject;
      });
    }

    // ---------- SERVICE WORKER ----------
    async function registerSW() {
      if ('serviceWorker' in navigator) {
        const swBlob = new Blob([`
          self.addEventListener('install', (e) => self.skipWaiting());
          self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
          self.addEventListener('sync', (e) => {
            if (e.tag.startsWith('reminder-')) {
              const id = parseInt(e.tag.split('-')[1]);
              e.waitUntil(
                clients.matchAll().then(clients => {
                  if (clients.length > 0) {
                    clients[0].postMessage({ type: 'reminder-triggered', id });
                  } else {
                    self.registration.showNotification('AI Reminder', {
                      body: 'Your scheduled reminder.',
                      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>',
                    });
                  }
                })
              );
            }
          });
          self.addEventListener('notificationclick', (e) => {
            e.notification.close();
            e.waitUntil(clients.openWindow('.'));
          });
        `], { type: 'application/javascript' });
        
        try {
          const swURL = URL.createObjectURL(swBlob);
          await navigator.serviceWorker.register(swURL);
          console.log('Service Worker Registered');
        } catch (e) {
          console.warn('SW registration failed', e);
        }
      }
    }

    // ---------- UI: CHAT MESSAGES ----------
    function addMessage(text, sender) {
      const wrapper = document.createElement('div');
      wrapper.className = `flex w-full ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
      
      const bubble = document.createElement('div');
      bubble.className = `max-w-[85%] p-3 rounded-2xl text-sm md:text-base leading-relaxed shadow-sm animate-[fadeIn_0.3s_ease-out] ${
        sender === 'user' 
          ? 'bg-indigo-600 text-white rounded-br-sm' 
          : 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-bl-sm border border-slate-100 dark:border-slate-700'
      }`;
      
      // Basic markdown-like rendering for bold text
      const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      bubble.innerHTML = formattedText;
      
      wrapper.appendChild(bubble);
      chat.appendChild(wrapper);
      
      // Smooth scroll to bottom
      setTimeout(() => {
        chat.scrollTop = chat.scrollHeight;
      }, 50);
    }

    // ---------- TEXT TO SPEECH ----------
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      // Remove emojis and special formatting before speaking
      const cleanText = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').replace(/\*/g, '');
      const utter = new SpeechSynthesisUtterance(cleanText);
      utter.lang = 'en-US';
      utter.rate = 1.05;
      utter.pitch = 1.1;
      
      // Try to find a good female English voice if available
      const voices = window.speechSynthesis.getVoices();
      const preferredVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Samantha')));
      if (preferredVoice) utter.voice = preferredVoice;

      window.speechSynthesis.speak(utter);
    }

    // Load voices proactively
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ---------- VOICE RECOGNITION (Wake word) ----------
    let recognition;
    let isListening = false;
    const wakeWord = /hey\s*ai/i;

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        voiceBtn.style.display = 'none';
        return;
      }
      
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      
      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        transcript = transcript.trim();
        
        // Visual feedback during speech
        if(transcript) textInput.placeholder = `Listening: ${transcript}...`;
        
        if (event.results[event.results.length-1].isFinal) {
          textInput.placeholder = "Type or say 'Hey AI'...";
          if (wakeWord.test(transcript)) {
             const cmd = transcript.replace(wakeWord, '').trim();
             if (cmd) {
               addMessage(cmd, 'user');
               processMessage(cmd);
             } else {
               addMessage("I'm listening. How can I help?", 'assistant');
               speak("I'm listening. How can I help?");
             }
          } else if (document.activeElement !== textInput && transcript.length > 2) {
             // If user just clicks mic and speaks without wake word
             addMessage(transcript, 'user');
             processMessage(transcript);
          }
        }
      };

      recognition.onerror = (e) => {
        if (e.error === 'no-speech') return;
        console.warn('Speech recognition error', e.error);
        stopListening();
      };

      recognition.onend = () => {
        if (isListening) {
          try { recognition.start(); } catch(e) {}
        }
      };
    }

    function toggleListening() {
      if (!recognition) return;
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    }

    function startListening() {
      isListening = true;
      try { 
        recognition.start(); 
        voiceBtn.classList.add('text-red-500');
        voiceBtn.classList.remove('text-slate-500', 'dark:text-slate-500');
        voiceRipple.classList.add('animate-pulse-fast', 'opacity-20');
        textInput.placeholder = "Listening...";
      } catch(e) {}
    }

    function stopListening() {
      isListening = false;
      try { 
        recognition.stop(); 
        voiceBtn.classList.remove('text-red-500');
        voiceRipple.classList.remove('animate-pulse-fast', 'opacity-20');
        textInput.placeholder = "Type or say 'Hey AI'...";
      } catch(e) {}
    }

    voiceBtn.onclick = toggleListening;

    // ---------- INTENT CATEGORIES ----------
    const intents = [
      { category: 'time', keywords: ['time','clock','date','today'] },
      { category: 'note', keywords: ['note','write','save', 'remember'] },
      { category: 'task', keywords: ['task','todo','remind', 'list'] },
      { category: 'joke', keywords: ['joke','funny','laugh', 'humor'] },
      { category: 'quote', keywords: ['quote','inspire','motivate', 'wisdom'] },
      { category: 'battery', keywords: ['battery','power','charge'] },
      { category: 'help', keywords: ['help','commands','what can you do', 'features'] },
      { category: 'clear', keywords: ['clear','delete all','remove', 'reset'] },
    ];

    async function detectIntent(text) {
      if (!classifier) return 'unknown';
      const candidateLabels = intents.map(i => i.category);
      try {
        const result = await classifier(text, candidateLabels);
        const topLabel = result.labels[0];
        const confidence = result.scores[0];
        return confidence > 0.4 ? topLabel : 'unknown';
      } catch (err) {
        console.error('Classification error', err);
        return 'unknown';
      }
    }

    // ---------- INTENT HANDLERS ----------
    function handleTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
      const dateStr = now.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
      const response = `🕒 It's **${timeStr}** on ${dateStr}.`;
      addMessage(response, 'assistant');
      speak(`It is ${timeStr}`);
    }

    async function handleNote(text) {
      const noteContent = text.replace(/^(note|write|save|remember that)\s*/i, '').trim();
      if (!noteContent || noteContent === text) { 
        addMessage('What would you like me to note down?', 'assistant'); 
        speak('What would you like me to note down?');
        return; 
      }
      await dbAdd('notes', { content: noteContent, created: Date.now() });
      addMessage(`📝 Noted: "${noteContent}"`, 'assistant');
      speak('Saved to your notes.');
    }

    async function handleTask(text) {
      if (text.match(/remind\s*me\s*in/i)) return handleReminder(text);
      
      const taskContent = text.replace(/^(add|create)?\s*(task|todo|remind\s*me\s*to)\s*/i, '').trim();
      if (!taskContent || taskContent === text) { 
        addMessage('What task should I add to your list?', 'assistant'); 
        speak('What task should I add?');
        return; 
      }
      await dbAdd('tasks', { content: taskContent, done: false, created: Date.now() });
      addMessage(`✅ Added to tasks: **${taskContent}**`, 'assistant');
      speak('Task added successfully.');
    }

    async function handleReminder(text) {
      const matchIn = text.match(/in\s+(\d+)\s*(second|sec|minute|min|hour|hr)s?/i);
      if (matchIn) {
        const amount = parseInt(matchIn[1]);
        const unit = matchIn[2].toLowerCase();
        let ms = 0;
        if (unit.startsWith('sec')) ms = amount * 1000;
        else if (unit.startsWith('min')) ms = amount * 60000;
        else if (unit.startsWith('hour') || unit.startsWith('hr')) ms = amount * 3600000;
        
        if (ms > 0 && ms <= 86400000) {
          const action = text.replace(/remind\s*me\s*in\s+\d+\s*\w+/i, '').replace(/to\s+/i,'').trim() || "Reminder";
          
          await dbAdd('reminders', { text: action, ms, created: Date.now() });
          addMessage(`⏰ I'll remind you to **${action}** in ${amount} ${unit}.`, 'assistant');
          speak(`Reminder set for ${amount} ${unit}`);
          
          setTimeout(() => {
            if (Notification.permission === 'granted') {
              new Notification('AI Reminder', { body: action, icon: '🔔' });
            }
            addMessage(`🔔 **Reminder:** ${action}`, 'assistant');
            speak(`Reminder: ${action}`);
          }, ms);
        }
      } else {
        addMessage('Please specify a time format like "Remind me to call John in 10 minutes".', 'assistant');
      }
    }

    function handleJoke() {
      const jokes = [
        "Why don't scientists trust atoms? Because they make up everything!",
        "I told my computer I needed a break... now it won't stop sending me KitKat ads.",
        "Why did the AI cross the road? To optimize the pathfinding algorithm.",
        "There are 10 types of people in the world: those who understand binary, and those who don't."
      ];
      const joke = jokes[Math.floor(Math.random() * jokes.length)];
      addMessage(`😂 ${joke}`, 'assistant');
      speak(joke);
    }

    function handleQuote() {
      const quotes = [
        "The best way to predict the future is to invent it. – Alan Kay",
        "It's not a bug, it's an undocumented feature. – Anonymous",
        "First, solve the problem. Then, write the code. – John Johnson",
        "Simplicity is the soul of efficiency. – Austin Freeman"
      ];
      const quote = quotes[Math.floor(Math.random() * quotes.length)];
      addMessage(`✨ ${quote}`, 'assistant');
      speak(quote.split('–')[0]); // Only speak the quote part
    }

    async function handleBattery() {
      if ('getBattery' in navigator) {
        const battery = await navigator.getBattery();
        const level = Math.round(battery.level * 100);
        const charging = battery.charging ? 'charging ⚡' : 'not charging';
        addMessage(`🔋 Your battery is at **${level}%** and is currently ${charging}.`, 'assistant');
        speak(`Battery is at ${level} percent.`);
      } else {
        addMessage('Battery information is not available on this device/browser.', 'assistant');
      }
    }

    function handleHelp() {
      const helpText = `
        I can help you with several things right on your device! Try asking:
        <br>• 🕒 **"What time is it?"**
        <br>• 📝 **"Note that I parked in section 4"**
        <br>• ✅ **"Add a task to buy groceries"**
        <br>• ⏰ **"Remind me to stretch in 5 minutes"**
        <br>• 😂 **"Tell me a joke"**
        <br>• 🔋 **"What's my battery level?"**
        <br>• 🗑️ **"Clear my notes/tasks"**
      `;
      addMessage(helpText, 'assistant');
      speak("Here are some things you can ask me to do.");
    }

    async function handleClear(text) {
      if (text.includes('task')) {
        await dbClear('tasks');
        addMessage('🗑️ All tasks have been cleared.', 'assistant');
        speak('Tasks cleared.');
      } else if (text.includes('note')) {
        await dbClear('notes');
        addMessage('🗑️ All notes have been cleared.', 'assistant');
        speak('Notes cleared.');
      } else {
        addMessage('Please specify what you want to clear (e.g., "clear my tasks" or "clear notes").', 'assistant');
      }
    }

    // ---------- MAIN MESSAGE PROCESSING ----------
    async function processMessage(rawText) {
      if (!classifier) {
        addMessage('⏳ I am still loading my intelligence model. Please wait a moment...', 'assistant');
        return;
      }

      const text = rawText.trim();
      const intent = await detectIntent(text);
      
      // Execute based on intent, with fallback logic
      switch (intent) {
        case 'time': return handleTime();
        case 'note': return handleNote(text);
        case 'task': return handleTask(text);
        case 'joke': return handleJoke();
        case 'quote': return handleQuote();
        case 'battery': return handleBattery();
        case 'help': return handleHelp();
        case 'clear': return handleClear(text);
        default:
          // Heuristic Fallback
          const lowerText = text.toLowerCase();
          if (lowerText.includes('time') || lowerText.includes('date')) return handleTime();
          if (lowerText.includes('joke')) return handleJoke();
          if (lowerText.includes('hello') || lowerText.includes('hi ')) {
             addMessage("Hello there! How can I help you today?", "assistant");
             speak("Hello! How can I help?");
             return;
          }
          if (lowerText.includes('thank')) {
             addMessage("You're very welcome!", "assistant");
             speak("You're welcome!");
             return;
          }
          addMessage("I'm not entirely sure how to help with that yet. Try saying **'Help'** to see what I can do.", 'assistant');
          speak("I'm not sure about that. Say help to see my capabilities.");
      }
    }

    // ---------- INITIALIZATION ----------
    async function init() {
      // 1. Initialize DB & Service Worker
      await openDB().catch(e => console.error(e));
      registerSW();
      initRecognition();

      // 2. Battery Monitoring
      if ('getBattery' in navigator) {
        const battery = await navigator.getBattery();
        function updateBatteryUI() {
          const level = Math.round(battery.level * 100);
          batteryIndicator.textContent = `${level}%`;
          
          if (battery.charging) {
             batteryContainer.innerHTML = `<i data-lucide="zap" class="w-4 h-4 text-amber-500"></i><span id="batteryIndicator">${level}%</span>`;
          } else if (level < 20) {
             batteryContainer.innerHTML = `<i data-lucide="battery-warning" class="w-4 h-4 text-red-500"></i><span id="batteryIndicator">${level}%</span>`;
          } else {
             batteryContainer.innerHTML = `<i data-lucide="battery" class="w-4 h-4"></i><span id="batteryIndicator">${level}%</span>`;
          }
          lucide.createIcons();
        }
        updateBatteryUI();
        battery.addEventListener('levelchange', updateBatteryUI);
        battery.addEventListener('chargingchange', updateBatteryUI);
      } else {
        document.getElementById('batteryContainer').style.display = 'none';
      }

      // 3. Request Notifications
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }

      // 4. Initial Greeting
      setTimeout(() => {
        addMessage('👋 Hello! I am your on-device AI assistant. All processing happens locally for your privacy.', 'assistant');
      }, 500);

      // 5. Load Transformer Model
      try {
        progressContainer.classList.remove('hidden');
        
        classifier = await pipeline('zero-shot-classification', 'Xenova/distilbert-base-uncased-mnli', {
          progress_callback: (x) => {
            if (x.status === 'progress' && x.progress) {

              modelStatus.textContent = `Downloading AI... ${Math.round(x.progress)}%`;
